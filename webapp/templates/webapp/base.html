<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ordonnancement Hybride{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f6fa; }
        .navbar { background: linear-gradient(135deg, #2c3e50, #3498db); }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 12px; }
        .btn-primary { background: #3498db; border: none; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #2ecc71; border: none; }
        .btn-warning { background: #f39c12; border: none; color: white; }
        .hero { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; border-radius: 12px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">Ordonnancement IA Hybride</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'index' %}">Accueil</a>
                <a class="nav-link" href="{% url 'upload_csv' %}">Upload CSV</a>
                <a class="nav-link" href="{% url 'benchmark' %}">Benchmark</a>
                <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted mt-5 mb-3">
        <small>Projet Tutore L3 MIASHS - IA Hybride pour l'Ordonnancement</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
